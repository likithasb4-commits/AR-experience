<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AR Product Experience</title>

  <!-- model-viewer component (handles WebXR + Scene Viewer + Quick Look) -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0a0a0f;
      --paper:  #f5f2eb;
      --acid:   #c8ff00;
      --muted:  #7a7a6e;
      --radius: 2px;
    }

    html, body {
      height: 100%;
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ─── LANDING SCREEN ─────────────────────────────────────── */
    #landing {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      padding: 2rem;
      background: var(--ink);
      z-index: 100;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #landing.hidden { opacity: 0; visibility: hidden; }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.8rem, 12vw, 5.5rem);
      font-weight: 800;
      line-height: .9;
      letter-spacing: -.04em;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    h1 span { color: var(--acid); }

    .sub {
      font-size: .78rem;
      color: var(--muted);
      text-align: center;
      max-width: 280px;
      line-height: 1.7;
      margin-bottom: 3rem;
    }

    #launch-btn {
      position: relative;
      display: inline-flex; align-items: center; gap: .75rem;
      background: var(--acid);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: .8rem;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      border: none;
      padding: 1rem 2rem;
      cursor: pointer;
      border-radius: var(--radius);
      transition: transform .15s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    #launch-btn:active { transform: scale(.97); }
    #launch-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .hint {
      margin-top: 2rem;
      font-size: .62rem;
      letter-spacing: .12em;
      color: var(--muted);
      text-align: center;
    }

    /* ─── MODEL-VIEWER ───────────────────────────────────────── */
    #viewer-wrap {
      position: fixed; inset: 0;
      opacity: 0; visibility: hidden;
      transition: opacity .5s ease, visibility .5s ease;
      z-index: 50;
    }
    #viewer-wrap.visible { opacity: 1; visibility: visible; }

    model-viewer {
      width: 100%;
      height: 100%;
      background-color: #1a1a22;
      --poster-color: transparent;
    }

    /* ─── CUSTOM AR BUTTON (inside model-viewer slot) ─────────── */
    #ar-button {
      position: absolute;
      bottom: 2.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: inline-flex; align-items: center; gap: .6rem;
      background: var(--acid);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      border: none;
      padding: .9rem 1.75rem;
      cursor: pointer;
      border-radius: var(--radius);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 0 1px rgba(200,255,0,.3), 0 8px 32px rgba(0,0,0,.5);
    }
    #ar-button svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Hide the AR button when AR is not available on this device */
    #ar-button[slot="ar-button"]:not([hidden]) { display: inline-flex; }

    /* ─── BACK BUTTON ────────────────────────────────────────── */
    #back-btn {
      position: absolute;
      top: 1.25rem; left: 1.25rem;
      display: inline-flex; align-items: center; gap: .4rem;
      background: rgba(245,242,235,.08);
      border: 1px solid rgba(245,242,235,.15);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: .65rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .5rem 1rem;
      cursor: pointer;
      border-radius: var(--radius);
      -webkit-tap-highlight-color: transparent;
      z-index: 10;
    }

    /* ─── LOADING STATE ──────────────────────────────────────── */
    #loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      background: var(--ink);
      z-index: 5;
      transition: opacity .4s ease;
    }
    #loading-overlay.done { opacity: 0; pointer-events: none; }

    .loader-ring {
      width: 42px; height: 42px;
      border: 2px solid rgba(200,255,0,.15);
      border-top-color: var(--acid);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── AR NOT SUPPORTED NOTICE ────────────────────────────── */
    #no-ar-notice {
      display: none;
      position: fixed; inset: 0;
      background: var(--ink);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 1.25rem;
      padding: 2rem;
      z-index: 200;
      text-align: center;
    }
    #no-ar-notice.show { display: flex; }
    #no-ar-notice h2 { font-family: 'Syne', sans-serif; font-size: 1.6rem; }
    #no-ar-notice p { color: var(--muted); font-size: .78rem; line-height: 1.8; max-width: 300px; }
    #no-ar-notice a {
      color: var(--acid);
      font-size: .7rem;
      letter-spacing: .1em;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     LANDING SCREEN
════════════════════════════════════════════════════════════ -->
<div id="landing">
  <p class="eyebrow">WebAR Experience</p>
  <h1>See it in<br><span>your space.</span></h1>
  <p class="sub">Place a true-scale 3D model anywhere in your environment. No app needed.</p>

  <button id="launch-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/>
    </svg>
    View in 3D
  </button>

  <p class="hint">↓ tap AR button to place in your room</p>
</div>

<!-- ═══════════════════════════════════════════════════════════
     MODEL-VIEWER  
     - ar                    → enables AR mode
     - ar-modes              → scene-viewer (Android) webxr (Chrome) quick-look (iOS)
     - ar-placement="floor"  → snaps to detected ground plane
     - ar-scale="auto"       → lets users pinch-resize in AR
     - camera-controls       → orbit in 3D preview
     - shadow-intensity      → fake ground shadow
════════════════════════════════════════════════════════════ -->
<div id="viewer-wrap">

  <model-viewer
    id="mv"
    src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    alt="A 3D product model"
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-placement="floor"
    ar-scale="auto"
    camera-controls
    auto-rotate
    auto-rotate-delay="2000"
    rotation-per-second="20deg"
    shadow-intensity="1"
    shadow-softness="0.8"
    exposure="1"
    environment-image="neutral"
    poster=""
    loading="eager"
  >
    <!-- Custom AR launch button (rendered inside model-viewer shadow DOM slot) -->
    <button id="ar-button" slot="ar-button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M2 12l5-3v6l5-3-5-3"/><rect x="12" y="3" width="9" height="9" rx="1"/><rect x="12" y="12" width="9" height="9" rx="1"/>
      </svg>
      Place in your room
    </button>

    <!-- Loading indicator inside model-viewer -->
    <div id="loading-overlay" slot="progress-bar">
      <div class="loader-ring"></div>
      <span class="loader-text">Loading model…</span>
    </div>

  </model-viewer>

  <!-- Back to landing -->
  <button id="back-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Back
  </button>

</div>

<!-- ═══════════════════════════════════════════════════════════
     AR NOT SUPPORTED (shown only when zero AR modes available)
════════════════════════════════════════════════════════════ -->
<div id="no-ar-notice">
  <h2>AR Unavailable</h2>
  <p>Your device or browser doesn't support WebAR. Try Chrome on Android or Safari on iOS 12+.</p>
  <a href="https://caniuse.com/webxr" target="_blank" rel="noopener">Check compatibility →</a>
</div>


<script>
  const landing    = document.getElementById('landing');
  const viewerWrap = document.getElementById('viewer-wrap');
  const launchBtn  = document.getElementById('launch-btn');
  const backBtn    = document.getElementById('back-btn');
  const mv         = document.getElementById('mv');
  const loadingOv  = document.getElementById('loading-overlay');
  const noAR       = document.getElementById('no-ar-notice');

  // ── 1. Launch 3D viewer ──────────────────────────────────────
  launchBtn.addEventListener('click', () => {
    landing.classList.add('hidden');
    viewerWrap.classList.add('visible');
  });

  backBtn.addEventListener('click', () => {
    viewerWrap.classList.remove('visible');
    landing.classList.remove('hidden');
  });

  // ── 2. Remove loading overlay once model is ready ───────────
  mv.addEventListener('load', () => {
    loadingOv.classList.add('done');
  });

  // ── 3. AR availability detection ────────────────────────────
  //    model-viewer fires 'ar-status' events. If the AR button
  //    is never shown it means no AR mode is available.
  mv.addEventListener('ar-status', (e) => {
    // e.detail.status: 'session-started' | 'object-placed' | 'failed' | 'not-presenting'
    if (e.detail.status === 'failed') {
      noAR.classList.add('show');
    }
  });

  // ── 4. How AR mode is triggered per platform ─────────────────
  //    Android  → tapping #ar-button fires Scene Viewer intent
  //               via model-viewer's built-in handler.
  //               Scene Viewer opens natively, places model on floor.
  //
  //    iOS      → tapping #ar-button triggers Quick Look via the
  //               ios-src (.usdz) attribute. iOS opens its own AR
  //               sheet; user taps "AR" to enter camera mode.
  //
  //    Desktop Chrome/Android Chrome with WebXR → enters an
  //               immersive-ar session directly in the browser;
  //               hit-test API detects ground plane, user taps to
  //               place, then walks around the object in true 6DoF.

  // ── 5. Swap model URL at runtime (optional) ─────────────────
  //    To load your own model, change src + ios-src:
  //
  //    mv.setAttribute('src', 'https://your-cdn.com/product.glb');
  //    mv.setAttribute('ios-src', 'https://your-cdn.com/product.usdz');
</script>
</body>
</html>
